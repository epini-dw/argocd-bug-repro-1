# This App will create a ConfigMap of the same name under the "test" namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scenario-1-two
  namespace: argocd

spec:
  project: scenario-1
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  sourceHydrator:
    drySource:
      path: charts/example
      repoURL: git://git-daemon/
      targetRevision: main
      helm:
        releaseName: 'two'
        valuesObject:
          namespace: test
          configmap:
            name: 'scenario-1-two'
            data:
              message: I won't be hydrated until a new commit is made.
    syncSource:
      path: 'manifests/scenario-1/two'
      targetBranch: hydrated
  syncPolicy:
    automated:
      enabled: true
