# This App will create a ConfigMap of the same name under the "test" namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scenario-3-app-of-apps
  namespace: argocd

spec:
  project: scenario-3
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  sourceHydrator:
    drySource:
      path: charts/app-of-apps
      repoURL: git://git-daemon/
      targetRevision: main
      helm:
        releaseName: 'app-of-apps'
        valueFiles:
          - /scenario-3/apps-list.yaml
        valuesObject:
          generatedManifestsDir: manifests/scenario-3
          project: scenario-3
    syncSource:
      path: 'manifests/scenario-3/app-of-apps'
      targetBranch: hydrated
  syncPolicy:
    automated:
      enabled: true
